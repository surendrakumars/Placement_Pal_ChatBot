services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: placementpal:latest
    container_name: placementpal_container
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./saved_codes:/app/saved_codes
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: placementpal_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

